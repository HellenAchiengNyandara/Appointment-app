services:
  - type: web
    name: appointment-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MAIL_SUPPRESS_SEND
        value: "1"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: appointment-db
          property: connectionString